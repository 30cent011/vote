<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fumble Market</title>
    <link rel="stylesheet" href="vote.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0b1221; color: #e2e8f0; }
        .form-shell { width: 100%; max-width: 420px; background: rgba(15, 23, 42, 0.96); border: 1px solid rgba(56, 189, 248, 0.14); border-radius: 24px; padding: 2rem; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35); }
        h1 { margin-bottom: 0.5rem; font-size: 2rem; }
        p { color: #94a3b8; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase; }
        input { width: 100%; padding: 0.95rem 1rem; margin-bottom: 1rem; border-radius: 14px; border: 1px solid rgba(148, 163, 184, 0.18); background: #0f172a; color: #e2e8f0; }
        .btn { width: 100%; padding: 0.95rem 1rem; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; }
        .secondary-link { margin-top: 1rem; text-align: center; color: #7dd3fc; display: block; text-decoration: none; }
        .message { margin-bottom: 1rem; padding: 0.95rem 1rem; border-radius: 14px; display: none; }
        .message.error { background: rgba(248, 113, 113, 0.12); border: 1px solid rgba(248, 113, 113, 0.3); color: #fecaca; }
        .message.success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.25); color: #bbf7d0; }
    </style>
</head>
<body>
    <div class="form-shell">
        <h1>Sign In</h1>
        <p>Use your Fumble Market account to place bets and track your balance.</p>
        <div id="status-message" class="message"></div>
        <form id="login-form">
            <label for="login-username">Username</label>
            <input id="login-username" name="username" type="text" autocomplete="username" required>
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit" class="btn">Log in</button>
        </form>
        <a class="secondary-link" href="signup.html">Create an account</a>
        <a class="secondary-link" href="index.html">Back to markets</a>
    </div>
    <script src="user-auth.js"></script>
    <script>
        const form = document.getElementById('login-form');
        const statusMessage = document.getElementById('status-message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            statusMessage.style.display = 'none';
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) {
                statusMessage.textContent = 'Please enter both username and password.';
                statusMessage.className = 'message error';
                statusMessage.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                saveUserSession(data.username, data.token);
                statusMessage.textContent = 'Login successful! Redirecting...';
                statusMessage.className = 'message success';
                statusMessage.style.display = 'block';
                setTimeout(() => window.location.href = 'market.html', 900);
            } catch (error) {
                statusMessage.textContent = error.message;
                statusMessage.className = 'message error';
                statusMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
